<h2 class="sr-only">vcf2report command panel for sample {{SAMPLE}}: buttons that trigger each analysis step in the chat.</h2>
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem;">
  <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
    <div style="width:34px; height:34px; border-radius:8px; background: var(--bg-accent); display:flex; align-items:center; justify-content:center;">
      <i class="ti ti-dna-2" style="font-size:20px; color: var(--text-accent);" aria-hidden="true"></i>
    </div>
    <div style="flex:1;">
      <div style="font-size:15px; font-weight:500;">vcf2report</div>
      <div style="font-size:12.5px; color: var(--text-secondary);">active sample · {{SAMPLE}}</div>
    </div>
    <span style="font-size:11.5px; font-weight:500; background: var(--{{STATUS_BG}}); color: var(--{{STATUS_FG}}); padding:4px 10px; border-radius:20px;">{{STATUS}}</span>
  </div>

  <div style="display:flex; flex-wrap:wrap; gap:6px; padding:10px 0 14px; border-top:0.5px solid var(--border); border-bottom:0.5px solid var(--border); margin-bottom:14px;">
    <span style="font-size:12px; color: var(--text-secondary); align-self:center; margin-right:2px;">pipeline</span>
    <span style="font-size:12px; background: var(--surface-1); border:0.5px solid var(--border); padding:3px 9px; border-radius:6px;">parse</span>
    <i class="ti ti-chevron-right" style="font-size:14px; color: var(--text-muted); align-self:center;" aria-hidden="true"></i>
    <span style="font-size:12px; background: var(--surface-1); border:0.5px solid var(--border); padding:3px 9px; border-radius:6px;">qc</span>
    <i class="ti ti-chevron-right" style="font-size:14px; color: var(--text-muted); align-self:center;" aria-hidden="true"></i>
    <span style="font-size:12px; background: var(--surface-1); border:0.5px solid var(--border); padding:3px 9px; border-radius:6px;">annotate</span>
    <i class="ti ti-chevron-right" style="font-size:14px; color: var(--text-muted); align-self:center;" aria-hidden="true"></i>
    <span style="font-size:12px; background: var(--surface-1); border:0.5px solid var(--border); padding:3px 9px; border-radius:6px;">acmg</span>
    <i class="ti ti-chevron-right" style="font-size:14px; color: var(--text-muted); align-self:center;" aria-hidden="true"></i>
    <span style="font-size:12px; background: var(--bg-accent); color: var(--text-accent); padding:3px 9px; border-radius:6px;">report</span>
  </div>

  <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:10px;">
    <button onclick="sendPrompt('Analyze exome {{SAMPLE}} in vcf2report from the start: parse, QC, annotation, ACMG and report.')" style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; padding:12px 14px; text-align:left; height:auto;">
      <span style="display:flex; align-items:center; gap:8px; font-weight:500; font-size:14px;"><i class="ti ti-player-play" style="font-size:18px;" aria-hidden="true"></i> Run analysis ↗</span>
      <span style="font-size:12px; color: var(--text-secondary);">full pipeline</span>
    </button>

    <button onclick="sendPrompt('Sample {{SAMPLE}} is GRCh37. Run the liftover to GRCh38 (scripts/liftover_to_grch38.py) before continuing.')" style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; padding:12px 14px; text-align:left; height:auto;">
      <span style="display:flex; align-items:center; gap:8px; font-weight:500; font-size:14px;"><i class="ti ti-arrows-exchange" style="font-size:18px;" aria-hidden="true"></i> Liftover 37 → 38 ↗</span>
      <span style="font-size:12px; color: var(--text-secondary);">convert build if needed</span>
    </button>

    <button onclick="sendPrompt('Estimate the sequencing quality and coverage of sample {{SAMPLE}} (QC panel).')" style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; padding:12px 14px; text-align:left; height:auto;">
      <span style="display:flex; align-items:center; gap:8px; font-weight:500; font-size:14px;"><i class="ti ti-chart-histogram" style="font-size:18px;" aria-hidden="true"></i> Coverage & QC ↗</span>
      <span style="font-size:12px; color: var(--text-secondary);">depth, Ti/Tv, PASS</span>
    </button>

    <button onclick="sendPrompt('Build the local gnomAD Parquet store (scripts/build_gnomad_parquet.py) and tell me how long it took.')" style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; padding:12px 14px; text-align:left; height:auto;">
      <span style="display:flex; align-items:center; gap:8px; font-weight:500; font-size:14px;"><i class="ti ti-database" style="font-size:18px;" aria-hidden="true"></i> Local gnomAD ↗</span>
      <span style="font-size:12px; color: var(--text-secondary);">offline frequencies</span>
    </button>

    <button onclick="sendPrompt('Generate the ACMG report for sample {{SAMPLE}} and render it as an Artifact, with the timing analysis.')" style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; padding:12px 14px; text-align:left; height:auto;">
      <span style="display:flex; align-items:center; gap:8px; font-weight:500; font-size:14px;"><i class="ti ti-file-text" style="font-size:18px;" aria-hidden="true"></i> Generate report ↗</span>
      <span style="font-size:12px; color: var(--text-secondary);">HGVS, tiers, conclusion</span>
    </button>

    <button onclick="sendPrompt('Run the concordance panel (ClinVar vs engine) and show me precision, sensitivity and gross discordances.')" style="display:flex; flex-direction:column; align-items:flex-start; gap:4px; padding:12px 14px; text-align:left; height:auto;">
      <span style="display:flex; align-items:center; gap:8px; font-weight:500; font-size:14px;"><i class="ti ti-checkup-list" style="font-size:18px;" aria-hidden="true"></i> Concordance ↗</span>
      <span style="font-size:12px; color: var(--text-secondary);">validate against ClinVar</span>
    </button>
  </div>
</div>
